<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome | Smart Expenses Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body class="splash-screen">
    <main class="splash-wrap">
      <div class="splash-backdrop"></div>
      <section class="splash-card">
        <div class="splash-left">
          <p class="splash-kicker">Personal finance made simple</p>
          <h1>Smart Expenses Tracker</h1>
          <p class="splash-copy">
            Track daily spending, uncover trends, and build healthier money
            habits with clear weekly and monthly insights.
          </p>
          <div class="splash-actions">
            <a class="btn btn-light btn-lg" href="{{ url_for('auth.login') }}"
              >Login Now</a
            >
            <a
              class="btn btn-outline-light btn-lg"
              href="{{ url_for('auth.register') }}"
              >Register</a
            >
          </div>
          <p class="splash-timer">Redirecting to login in 5 seconds...</p>
        </div>

        <div class="splash-right" aria-hidden="true">
          <img
            src="{{ url_for('static', filename='images/coins.svg') }}"
            alt="Coins illustration"
            class="splash-image splash-image-main"
          />
          <img
            src="{{ url_for('static', filename='images/chart.svg') }}"
            alt="Analytics illustration"
            class="splash-image splash-image-secondary"
          />
        </div>
      </section>
    </main>

    <script>
      setTimeout(() => {
        window.location.href = "{{ url_for('auth.login') }}";
      }, 5000);
    </script>
  </body>
</html>
